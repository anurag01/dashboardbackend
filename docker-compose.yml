services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DEBUG: "1"
      ALLOWED_HOSTS: "*"
      CORS_ALLOWED_ORIGINS: "http://localhost:5173"
      CSRF_TRUSTED_ORIGINS: "http://localhost:5173"
      HUBSPOT_ACCESS_TOKEN: ""
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: "http://localhost:8000/api"
    depends_on:
      - backend
    ports:
      - "5173:4173"
